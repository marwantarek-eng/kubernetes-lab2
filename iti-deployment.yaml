apiVersion: apps/v1
kind: Deployment
metadata:
  name: iti-nginx
  namespace: iti-46
spec:
  replicas: 3
  selector:
   matchLabels:
    app: nginx
  template:
   metadata:
      labels:
        app: nginx
   spec:
      containers:
      - name: nginx
        image: nginx:alpine
        env:
          - name:  FOO
            value: ITI
